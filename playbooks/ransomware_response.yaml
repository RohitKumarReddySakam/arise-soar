name: ransomware_response
description: Critical ransomware containment and eradication playbook
trigger: ransomware
severity: CRITICAL
avg_execution_time: 60s
mitre_tactics:
  - "TA0040 - Impact"
  - "T1486 - Data Encrypted for Impact"
  - "TA0011 - Command and Control"

steps:
  - action: isolate_host
    description: Immediately isolate infected host from all network segments
    required: true

  - action: terminate_process
    description: Terminate ransomware process via EDR agent
    required: true

  - action: collect_forensics
    description: Collect memory dump, running processes, and network connections
    required: true

  - action: scan_network
    description: Scan for lateral movement and additional infected hosts
    required: true

  - action: revoke_tokens
    description: Revoke all active authentication tokens for compromised accounts
    required: true

  - action: notify_team
    description: Immediately alert CISO, SOC Lead, and IR team
    required: true

  - action: preserve_evidence
    description: Hash and preserve all digital evidence for forensic analysis
    required: true

  - action: create_ticket
    description: Create P1 incident ticket with full timeline
    required: true

  - action: notify_legal
    description: Notify legal team for potential breach disclosure requirements
    required: false
